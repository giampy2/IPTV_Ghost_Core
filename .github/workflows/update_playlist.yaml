name: Update IPTV Playlist
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests xmltodict
      - name: Run Update Script
        run: python update_playlist.py
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
      - name: Stage Changes
        run: git add playlist.m3u
      - name: Commit Changes
        run: |
          git diff --quiet HEAD -- playlist.m3u || git commit -m "Auto-update: Playlist refreshed"
      - name: Push to Main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/giampy2/IPTV_Ghost_Core.git HEAD:main
